<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Antenna push model before optimization</title>
  <desc id="desc">Mermaid-style sequence diagram showing Antenna pushing to a public Processing Service endpoint and waiting on a synchronous blocking response.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#1A5276"/>
    </marker>
    <style>
      .bg{fill:#f9f7f2}.panel{fill:#fff;stroke:#d5d8de;stroke-width:2}.actor{fill:#f6f7f8;stroke:#1A5276;stroke-width:4}.actor-alt{fill:#f2efe6;stroke:#85754d;stroke-width:4}.title{font-family:"Encode Sans",Arial,sans-serif;font-size:44px;font-weight:800;fill:#1A5276}.label{font-family:"Encode Sans",Arial,sans-serif;font-size:27px;font-weight:700;fill:#1a1d1f}.small{font-family:"Open Sans",Arial,sans-serif;font-size:22px;font-weight:600;fill:#373a3c}.note{font-family:"Open Sans",Arial,sans-serif;font-size:24px;font-weight:700;fill:#1A5276}.muted{stroke:#72777c;stroke-width:3;stroke-dasharray:12 12}.flow{stroke:#1A5276;stroke-width:5;fill:none;marker-end:url(#arrow)}.wait{stroke:#85754d;stroke-width:5;fill:none;marker-end:url(#arrow)}.block{fill:#e8e3d3;stroke:#85754d;stroke-width:3}.badge{fill:#fff;stroke:#b7a57a;stroke-width:2}.badge-text{font-family:"Encode Sans",Arial,sans-serif;font-size:20px;font-weight:700;fill:#373a3c;text-transform:uppercase}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <rect class="panel" x="64" y="72" width="1472" height="756" rx="8"/>
  <text class="title" x="104" y="136">A. Push Model Before: Synchronous Endpoint</text>
  <text class="small" x="104" y="178">Antenna initiates work and blocks while the public processing service runs.</text>

  <g transform="translate(180 236)">
    <rect class="actor" x="0" y="0" width="280" height="92" rx="8"/>
    <text class="label" x="140" y="38" text-anchor="middle">Antenna</text>
    <text class="small" x="140" y="68" text-anchor="middle">job orchestration</text>
    <line class="muted" x1="140" y1="112" x2="140" y2="520"/>
  </g>

  <g transform="translate(670 236)">
    <rect class="actor-alt" x="0" y="0" width="280" height="92" rx="8"/>
    <text class="label" x="140" y="38" text-anchor="middle">Public Endpoint</text>
    <text class="small" x="140" y="68" text-anchor="middle">Processing Service</text>
    <line class="muted" x1="140" y1="112" x2="140" y2="520"/>
  </g>

  <g transform="translate(1160 236)">
    <rect class="actor" x="0" y="0" width="260" height="92" rx="8" opacity=".92"/>
    <text class="label" x="130" y="38" text-anchor="middle">Worker Runtime</text>
    <text class="small" x="130" y="68" text-anchor="middle">service-owned</text>
    <line class="muted" x1="130" y1="112" x2="130" y2="520"/>
  </g>

  <path class="flow" d="M320 402 H810"/>
  <rect class="badge" x="430" y="366" width="270" height="50" rx="4"/>
  <text class="badge-text" x="565" y="398" text-anchor="middle">POST job payload</text>

  <path class="flow" d="M810 506 H1290"/>
  <rect class="badge" x="932" y="470" width="250" height="50" rx="4"/>
  <text class="badge-text" x="1057" y="502" text-anchor="middle">Start processing</text>

  <rect class="block" x="295" y="440" width="50" height="250" rx="4"/>
  <text class="note" x="370" y="575">Antenna waits for the blocking response</text>

  <path class="wait" d="M1290 650 H810"/>
  <rect class="badge" x="930" y="614" width="245" height="50" rx="4"/>
  <text class="badge-text" x="1052" y="646" text-anchor="middle">Result returned</text>

  <path class="wait" d="M810 738 H320"/>
  <rect class="badge" x="430" y="702" width="276" height="50" rx="4"/>
  <text class="badge-text" x="568" y="734" text-anchor="middle">Synchronous response</text>

  <g transform="translate(104 780)">
    <rect x="0" y="0" width="1180" height="34" rx="4" fill="#f2efe6"/>
    <text class="small" x="18" y="24">UX read: one long request couples Antenna availability to endpoint latency and service reachability.</text>
  </g>
</svg>
